// ############## switch case ##############


//1. Você está desenvolvendo um sistema simples de menu para um aplicativo.

// Solicite ao usuário uma opção digitando:
// 1 - Cadastrar usuário
// 2 - Listar usuários
// 3 - Sair do sistema

// Utilize switch para exibir a ação correspondente a cada opção. Caso o valor seja inválido, exiba "Opção inválida".

// Repita a solicitação até que a pessoa selecione a opção 3 para sair do sistema.



 let opcao;

do {

    opcao = parseInt(prompt(
        "--- MENU DO SISTEMA ---\n" +
        "1 - Cadastrar usuário\n" +
         "2 - Listar usuários\n" +
         "3 - Sair do sistema\n\n" +
         "Escolha uma opção:"
     ));

     switch (opcao) {
         case 1:
             alert("Ação: Cadastrando novo usuário...");
            break;
         case 2:
            alert("Ação: Listando todos os usuários...");
             break;
         case 3:
             alert("Saindo do sistema... Até logo!");
            break;
         default:
             alert("Opção inválida! Tente novamente.");
             break;
     }
        opcao = prompt("Digite uma opção (1, 2 ou 3):");

 } while (opcao !== 3);

 //2. Crie um programa para mostrar o nome do mês de acordo com o número digitado. 1 = "Janeiro", 2 = "Fevereiro" ....

let numeroMes = parseInt(prompt("Digite um número de 1 a 12 para saber o nome do mês:"));
switch (numeroMes) {
    case 1:
        alert("Janeiro");
        break;
    case 2:
        alert("Fevereiro");
        break;
    case 3:
        alert("Março");
        break;
    case 4:
        alert("Abril");
        break;
    case 5:
        alert("Maio");
        break;
    case 6:
        alert("Junho");
        break;
    case 7:
        alert("Julho");
        break;
    case 8:
        alert("Agosto");
        break;
    case 9:
        alert("Setembro");
        break;
    case 10:
        alert("Outubro");
        break;
    case 11:
        alert("Novembro");
        break;
    case 12:
        alert("Dezembro");
        break;
    default:
        alert("Número inválido! Por favor, digite um número entre 1 e 12.");
}

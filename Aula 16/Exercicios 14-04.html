//Você está desenvolvendo um sistema de atendimento para um aplicativo.

//O usuário deve escolher uma opção:

//1 - Criar conta
//2 - Fazer login 
//3 - Recuperar senha

//Dependendo da escolha, o sistema deve:

//1 (Criar conta):
//	pedir nome
//	pedir email
//	pedir senha

//	pedir email
//	pedir senha

//3 (Recuperar senha):
//	pedir email
//	perguntar "Deseja receber código por email ou SMS?"

//Caso a opção seja inválida, exibir "Opção inválida"

while (true) {
    let opcaoAtendimento = parseInt(prompt(
        "--- MENU DE ATENDIMENTO ---\n" +
        "1 - Criar conta\n" +
        "2 - Fazer login\n" +
        "3 - Recuperar senha\n\n" +
        "Escolha uma opção:"
    ));

    switch (opcaoAtendimento) {
        case 1:
            let nome = prompt("Digite seu nome:");
            let emailCriacao = prompt("Digite seu email:");
            let senhaCriacao = prompt("Digite sua senha:");
            alert(`Conta criada com sucesso para ${nome}`);
            break;
        case 2:
            let emailLogin = prompt("Digite seu email:");
                if(emailLogin === emailCriacao) {
                    alert("Email encontrado. Por favor, digite sua senha.");
                } else {
                    alert("Email não encontrado. Por favor, crie uma conta primeiro.");
                    break;
                }
            let senhaLogin = prompt("Digite sua senha:");
                if(senhaLogin === senhaCriacao) {
                    alert("Senha correta. Login realizado com sucesso.");
                } else {
                    alert("Senha incorreta. Por favor, tente novamente.");
                    break;
                }
            alert("Login realizado com sucesso");
            break;
        case 3:
            let emailRecuperacao = prompt("Digite seu email:");
            let metodoRecuperacao = prompt("Deseja receber código por email ou SMS?");
            alert("Instruções enviadas");
            break;
        default:
            alert("Opção inválida! Por favor, escolha 1, 2 ou 3.");
            break;
    }
}

//5. sistema de saque/depósito (simulação de caixa eletrônico)

//Você está desenvolvendo um sistema simples de caixa eletrônico.

//O sistema deve iniciar com um saldo fictício de R$ 1000.

// Mostre o seguinte menu:

//1 - Consultar saldo
//2 - Sacar dinheiro
//3 - Depositar dinheiro

//Utilize switch para controlar o fluxo do sistema.

//Regras:

//1 (Consultar saldo):
//	exibir o saldo atual
//2 (Sacar dinheiro):
//	pedir o valor do saque
//	verificar:
//		se o valor é menor ou igual ao saldo → realizar saque
//		senão → exibir "Saldo insuficiente"
//			atualizar o saldo
//	exibir novo saldo
//3 (Depositar dinheiro):
//	pedir o valor do depósito
//	adicionar ao saldo
//	exibir novo saldo

let saldo = 1000;
while (saldo >= 0) {
    let opcaoCaixa = parseInt(prompt(
        "--- MENU DO CAIXA ELETRÔNICO ---\n" +
        "1 - Consultar saldo\n" +
        "2 - Sacar dinheiro\n" +
        "3 - Depositar dinheiro\n\n" +
        "Escolha uma opção:"
    ));

    switch (opcaoCaixa != 0) {
        case 1:
            alert(`Saldo atual: R$ ${saldo}`);
            break;
        case 2:
            let valorSaque = parseFloat(prompt("Digite o valor do saque:"));
            if (valorSaque <= saldo) {
                saldo -= valorSaque;
                alert(`Saque realizado com sucesso! Novo saldo: R$ ${saldo}`);
            } else {
                alert("Saldo insuficiente para realizar o saque.");
            }
            break;
        case 3:
            let valorDeposito = parseFloat(prompt("Digite o valor do depósito:"));
            saldo += valorDeposito;
            alert(`Depósito realizado com sucesso! Novo saldo: R$ ${saldo}`);
            break;
        default:
            alert("Opção inválida! Por favor, escolha 1, 2 ou 3.");
            break;
    }
}

        <!-- fazer um formulário com nome, idade, cidade e profissão. terá dois botões: um para enviar e outro para listar os cadastrados. savar os dados em arrays de objetos, se quiser listar, lê os cadastrados em uma outra div -->



<div class="container">
    <div class="row">
        <div class="col-6">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
            </div>
            <div>
                <label for="idade">Idade:</label>
                <input type="number" id="idade" name="idade">
            </div>
            <div>
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade">
            </div>
            <div>
                <label for="profissao">Profissão:</label>
                <input type="text" id="profissao" name="profissao">
            </div>
            <div>
                <button onclick="cadastrar()">Cadastrar</button>
                <button onclick="listar()">Listar Cadastrados</button>
            </div>
        </div>
    </div>
    <div id="resultado" style="margin-top: 20px;"></div>
</div>

<script>
    let cadastrados = [];

    function cadastrar() {
        
        let inputNome = document.getElementById('nome');
        let inputIdade = document.getElementById('idade');
        let inputCidade = document.getElementById('cidade');
        let inputProfissao = document.getElementById('profissao');

        
        let novoCadastro = {
            nome: inputNome.value,
            idade: inputIdade.value,
            cidade: inputCidade.value,
            profissao: inputProfissao.value
        };


        cadastrados.push(novoCadastro);
        alert('Cadastro realizado com sucesso!');

       
        inputNome.value = '';
        inputIdade.value = '';
        inputCidade.value = '';
        inputProfissao.value = '';
    }

    function listar() {
        let resultado = document.getElementById('resultado');
        resultado.innerHTML = ''; 

        if (cadastrados.length > 0) {
            cadastrados.forEach((cadastro, index) => {
             
                resultado.innerHTML += `<p>${index + 1} - Nome: ${cadastro.nome}, Idade: ${cadastro.idade}, Cidade: ${cadastro.cidade}, Profissão: ${cadastro.profissao}</p>`;
            });
        } else {
            resultado.innerHTML = '<p>Nenhum cadastro encontrado.</p>';
        }
    }
</script>

// 1. A variável deve estar fora das funções para ser global
let cadastros = []; 

function cadastrarContato() {
    let nome = prompt("Digite o nome:");
    let idade = parseInt(prompt("Digite a idade:"));
    let cidade = prompt("Digite a cidade:");
    let profissao = prompt("Digite a profissão:");

   
    if (!nome || isNaN(idade) || !cidade || !profissao) {
        console.log("Erro: Preencha todos os campos corretamente.");
        return;
    }

    if (idade < 0 || idade > 150) {
        console.log("Erro: Idade inválida.");
        return;
    }

    
    let novoCadastro = { nome, idade, cidade, profissao };
    cadastros.push(novoCadastro);
    
    console.log(`Contato ${nome} cadastrado com sucesso!`);
}

function listarContatos() {
    if (cadastros.length === 0) {
        console.log("Nenhum contato cadastrado.");
        return;
    }

    console.log("### LISTA DE CONTATOS ###");
    cadastros.forEach((item, index) => {
        console.log(`${index + 1}. ${item.nome} | ${item.idade} anos | ${item.cidade} | ${item.profissao}`);
    });
}

function deletarContato() {
    let nomeParaDeletar = prompt("Digite o nome do contato que deseja excluir:");
    
  
    let index = cadastros.findIndex(c => c.nome.toLowerCase() === nomeParaDeletar.toLowerCase());

    if (index !== -1) {
        cadastros.splice(index, 1);
        console.log(`Contato "${nomeParaDeletar}" deletado.`);
    } else {
        console.log("Contato não encontrado.");
    }
}

function menuPrincipal() {
    let continuar = true;

    while (continuar) {
        let opcao = prompt("1. Cadastrar\n2. Listar\n3. Deletar\n4. Sair");

        switch (opcao) {
            case '1':
                cadastrarContato();
                break;
            case '2':
                listarContatos();
                break;
            case '3':
                deletarContato();
                break;
            case '4':
                console.log("Saindo...");
                continuar = false;
                break;
            default:
                console.log("Opção inválida.");
        }
    }
}

menuPrincipal();

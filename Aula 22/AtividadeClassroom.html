<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Produtos - FakeStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card img { height: 200px; object-fit: contain; padding: 15px; }
        .product-card { transition: transform 0.2s; height: 100%; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #product-detail { display: none; margin-top: 50px; }
        .detail-img { max-height: 400px; object-fit: contain; width: 100%; }
    </style>
</head>
<body>

<div class="container my-5" id="vitrine-container">
    <h2 class="text-center mb-4">Nossos Produtos</h2>
    <div class="row row-cols-1 row-cols-md-4 g-4" id="lista-produtos">
        </div>
</div>

<div class="container" id="product-detail">
    <button class="btn btn-outline-secondary mb-4" onclick="voltarVitrine()">← Voltar para a vitrine</button>
    <div class="row bg-white p-4 rounded shadow-sm">
        <div class="col-md-6 text-center">
            <img src="" id="detalhe-img" class="detail-img" alt="Produto">
        </div>
        <div class="col-md-6">
            <h2 id="detalhe-nome"></h2>
            <p class="badge bg-primary" id="detalhe-categoria"></p>
            <p class="lead mt-3" id="detalhe-descricao"></p>
            <h3 class="text-success mb-4" id="detalhe-preco"></h3>

            <div class="card p-3 border-light bg-light">
                <h6>Simular Frete</h6>
                <div class="input-group mb-3">
                    <input type="text" id="cep-input" class="form-control" placeholder="Digite seu CEP (ex: 01001000)" maxlength="8">
                    <button class="btn btn-dark" onclick="consultarFrete()">Calcular</button>
                </div>
                <div id="resultado-frete" class="small"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const listaProdutos = document.getElementById('lista-produtos');
    const vitrine = document.getElementById('vitrine-container');
    const detalhe = document.getElementById('product-detail');

    //Buscar produtos na API da fakestore
    async function carregarProdutos() {
        try {
            const response = await fetch('https://fakestoreapi.com/products?limit=20');
            const produtos = await response.json();
            renderizarCards(produtos);
        } catch (error) {
            console.error("Erro ao carregar produtos:", error);
        }
    }

    //Criar os cards
    function renderizarCards(produtos) {
        produtos.forEach(prod => {
            const col = document.createElement('div');
            col.className = 'col';
            
            col.innerHTML = `
                <div class="card product-card h-100">
                    <img src="${prod.image}" class="card-img-top" alt="${prod.title}">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate">${prod.title}</h6>
                        <p class="card-text fw-bold text-primary">R$ ${prod.price.toFixed(2)}</p>
                        <button class="btn btn-outline-primary btn-sm mt-auto" onclick="verDetalhes(${prod.id})">Visualizar Item</button>
                    </div>
                </div>
            `;
            listaProdutos.appendChild(col);
        });
    }

    // 
    async function verDetalhes(id) {
        try {
            const response = await fetch(`https://fakestoreapi.com/products/${id}`);
            const prod = await response.json();

            // Preenche o DOM 
            document.getElementById('detalhe-img').src = prod.image;
            document.getElementById('detalhe-nome').innerText = prod.title;
            document.getElementById('detalhe-descricao').innerText = prod.description;
            document.getElementById('detalhe-categoria').innerText = prod.category;
            document.getElementById('detalhe-preco').innerText = `R$ ${prod.price.toFixed(2)}`;
            
        
            document.getElementById('cep-input').value = '';
            document.getElementById('resultado-frete').innerHTML = '';

        
            vitrine.style.display = 'none';
            detalhe.style.display = 'block';
            window.scrollTo(0,0);
        } catch (error) {
            alert("Erro ao buscar detalhes do produto.");
        }
    }

    // Voltar para a vitrine
    function voltarVitrine() {
        vitrine.style.display = 'block';
        detalhe.style.display = 'none';
    }

    // API de CEP ViaCEP
    async function consultarFrete() {
        const cep = document.getElementById('cep-input').value;
        const resultado = document.getElementById('resultado-frete');

        if (cep.length !== 8) {
            resultado.innerHTML = '<span class="text-danger">CEP inválido. Digite 8 números.</span>';
            return;
        }

        resultado.innerHTML = 'Calculando...';

        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();


            if (data.erro) {
                resultado.innerHTML = '<span class="text-danger">CEP não encontrado.</span>';
            } else {
                // O valor do frete vai ser sempre 15 conto
                resultado.innerHTML = `
                    <strong>Destino:</strong> ${data.logradouro}, ${data.bairro} - ${data.localidade}/${data.uf}<br>
                    <strong>Prazo:</strong> 5 dias úteis<br>
                    <strong>Valor:</strong> R$ 15,00
                `;
            }
        } catch (error) {
            resultado.innerHTML = '<span class="text-danger">Erro ao consultar CEP.</span>';
        }
    }

    // Inicialização
    carregarProdutos();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

// 1° - Crie um programa que peça para o usuário digitar o seu peso e sua altura. O programa deve calcular o IMC 			do usuário.
//         imc = peso/altura²
//         Depois de mostrar o IMC classifique em qual situação a pessoa se encontra de acordo com a seguinte tabela:
//         abaixo 
//         de 18,5 -> Abaixo do peso
//         de 18,5 até 25 -> Peso normal
//         de 25 até 30 -> Sobrepeso
//         de 30 ou mais -> Obesidade  


let peso
peso = prompt (`Digite o seu peso`)
let altura 
altura = prompt (`Digite sua altura (Não esqueça de colocar o ponto e não a virgula)`)

peso = parseFloat(peso)
altura = parseFloat(altura)

let imc

imc = peso / (altura * altura)

console.log(`Seu IMC é ${imc}`)

if(imc < 18.5 ){
    console.log(`Está abaixo do peso`)
}
if (imc > 18.5 && imc < 25) {
    console.log(`Está tudo ok`)
}
if (imc > 25 && imc < 30) {
    console.log(`Está Sobrepeso`)
} 
else {
    console.log(`Está Obeso`)
}
    




// 2. Peça para o usuário digitar 3 notas, calcule a média das notas e mostre na tela

//         Se a média for menor que 4 -> Reprovado
//         Se a média for de 4 até 7 -> Recuperação
//         Se a média for de 7 até 10 -> Aprovado
 
let nota1
let nota2
let nota3
let media

nota1 = prompt (`Digite a nota 1`)
nota2 = prompt (`Digite a nota 2`)
nota3 = prompt (`Digite a nota 3`)


nota1 = parseInt(nota1)
nota2 = parseInt(nota2)
nota3 = parseInt(nota3)

media = (nota1 + nota2 + nota3) / 3

console.log(` Sua Media é: ${media}`)

if(media < 4){
    console.log(`Reprovado`)
}
if(media >= 4 && media < 7){

    console.log("Recuperação")
}
else{
    console.log("Aprovado")
}

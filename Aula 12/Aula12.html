// /*1° Questão: Crie um programa que peça para ousuário digitar seu peso e sua altura e ao final dá o IMC da pessoa

// imc = peso / altrua²*/


let peso
peso = prompt (`Digite o seu peso`)
let altura 
altura = prompt (`Digite sua altura (Não esqueça de colocar o ponto e não a virgula)`)

peso = parseFloat(peso)
altura = parseFloat(altura)

let imc

imc = peso / (altura * altura)

console.log(`Seu IMC é ${imc}`)



// /* 2°Questão - Peça para o usuário digitar 3 notas, calcule a media das notas e moste na tela*/
 
let nota1
let nota2
let nota3
let media

nota1 = prompt (`Digite a nota 1`)
nota2 = prompt (`Digite a nota 2`)
nota3 = prompt (`Digite a nota 3`)


nota1 = parseInt(nota1)
nota2 = parseInt(nota2)
nota3 = parseInt(nota3)

media = (nota1 + nota2 + nota3) / 3

console.log(` Sua Media é: ${media}`)


/*3° Questão - Crie um programa que peça ao usuaio uma porcentagem de desconto. Depois peça o preço d produto e depois mostre o valor antes do desconto, o valor do desconto e o preço final do prodito*/

let preço
let desconto
let Valorfinal

preço = prompt(` qual o valor do produto `)
desconto = prompt(` Qual o desconto que vai ser atribuido ao produto ( formato decimal ex: 50% = 0.5 / 60% = 0.6 e etc...) (Não esqueça de usar ponto ao invés de virgurla)  `)

if(desconto < 1){
    preço = parseFloat (preço)
desconto = parseFloat (desconto)
Valorfinal = (preço * desconto)
}
else{
    Valorfinal = preço - preço * (desconto / 100)
}





console.log(`O valor do produto com desconto é de ${Valorfinal}`)

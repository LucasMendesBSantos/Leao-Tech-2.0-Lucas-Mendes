<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 19 - Operadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <style>
        .caixa{
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<!-- onload = evento que ocorre quando a página é carregada
     onscroll = evento que ocorre quando a página é rolada
     onresize = evento que ocorre quando a página é redimensionada
     onclick = evento que ocorre quando o usuário clica no elemento
     ondblclick = evento que ocorre quando o usuário clica duas vezes no elemento
     onmouseover = evento que ocorre quando o usuário passa o mouse sobre o elemento
     onmouseout = evento que ocorre quando o usuário retira o mouse do elemento -->

<body style="margin-bottom: 500px;" onload="eventosTela()" onscroll="eventosTela('Scroll')" onresize="eventosTela('redimensionou')">
    <h1>Aula de Eventos e DOM</h1>
    <div onclick="enviarMsg('unico')" onmouseout="enviarMsg('out')" class="bg-danger text-bg-light caixa ms-1">
        <p>Caixa 1</p>
    </div>

    <div ondblclick="enviarMsg('duplo')" class="bg-success text-bg-light caixa ms-1 mt-1">
        <p>Caixa 2</p>
    </div>

    <div onmouseover="enviarMsg('over')" class="bg-warning text-bg-light caixa ms-1 mt-1">
        <p>Caixa 3</p>
    </div>

    <div class="mt-3 border border-dark p-3 w-75">
        <h2 class="mb-3">Eventos de teclado</h2>
        <form action="" method="get" onsubmit="enviarFomulario(event)">
            <label for="nome">Nome:</label>
            <input onkeydown="apertouTecla('keydown')" id="nome" type="text">
            <br>

            <label for="nome">email:</label>
            <input onkeyup="apertouTecla('keyup')" onfocus="eventosFormulario('foco')" id="nome" type="text">
            <br>

            <label  for="telefone">telefone:</label>
            <input oninput="eventosFormulario('input')" id="telefone" type="text">

            <br>

            <label  for="telefone">Profissão:</label>
            <input onchange="eventosFormulario('change')" id="profissao" type="text">
            <br>
            <input  type="submit" value="Enviar">
        </form>
    </div>
</body>
<script>
function enviarFomulario(e){
    e.preventDefault()
    console.log('Evento do submit')
}
function eventosFormulario(tipo){
    if(tipo == 'foco'){
        console.log('Elemento com foco')
    }else if(tipo == 'input'){
        console.log('elemento recebeu dados')
    }else if(tipo == 'change'){
        console.log('elemento mudou')
    }
}

function apertouTecla(tipo){
    if(tipo == 'keydown'){
        alert('Tecla pressionada')
    }if (tipo == 'keyup'){
        alert('Tecla keyup')
    }
}

function enviarMsg(tipo){
    if (tipo == 'unico'){
        alert('Click único')
    }else if (tipo == 'duplo'){
        alert('Click dúplo')
    }else if (tipo == 'over'){
        alert('mouse over')
    }else if(tipo == 'out'){
        alert('mouse out')
    }
}

function eventosTela(){
    if(tipo == 'carregou'){
        console.log('A página carregou')
    }
    else if(tipo == 'Scroll'){
        console.log('A página foi rolada')
    }
    else if(tipo == 'redimensionou'){
        console.log('A página foi redimensionada')
    }
}



</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>

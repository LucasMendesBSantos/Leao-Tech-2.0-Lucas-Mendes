function calcularBaskara(a, b, c){
    let delta = b*b -4*a*c;
        if (delta > 0){
        console.log(` Existe duas raizes reais`)
            let raiz1 = -b + Math.sqrt(delta) / (2*a);
            let raiz2 = -b - Math.sqrt(delta) / (2*a);
            console.log(`Raiz 1: ${raiz1}`);
            console.log(`Raiz 2: ${raiz2}`);
        } else if (delta === 0){
            console.log(`Existe uma raiz real`);
            let raiz = -b / (2*a);
            console.log(`Raiz: ${raiz}`);
        } else {
            console.log(`Não existe raiz real`);
    }
}

<!-- 
Para fazer a Branch, Merge e Pull Request, siga os seguintes passos:

1. Crie uma Branch: No terminal, use o comando `git checkout -b nome-da-branch` para criar e mudar para a nova branch.
2. Faça as alterações, coloque git add .
3. Faça o commit das alterações usando o git commit -m 'Colocar a alteração aqui'
4. Para enviar a branch para o repositorio remoto use git push origin nome-da-branch
5. Vá para o repositório no GitHub, clique na aba "Pull Requests"
6. o reto é pelo git, facil de fazer e intuitivo.

-->
